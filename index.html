<style>
  /*
    FONT SYSTEM — MATCHED FROM LOGO:
    "Tara"    → Cormorant Garamond  (elegant serif, high contrast thick/thin strokes)
    "tech"    → Montserrat          (clean geometric sans, uniform weight)
    Subtitle  → Oswald              (condensed all-caps, wide tracking)
  */
  :root {
    /* Logo-anchored warm tones */
    --gold: #C9A84C;
    --gold-light: #E8C76A;
    --gold-bright: #F0D060;
    --red: #C0392B;
    --red-glow: #E85A2A;
    --purple: #5B189A;
    --purple-light: #8B33D4;
    /* Electric blue — primary UI accent */
    --blue: #0EA5E9;
    --blue-bright: #38BDF8;
    --blue-dim: #0369A1;
    --blue-glow: #00D4FF;
    /* Deep navy base */
    --dark: #000000;
    --dark-2: #040C18;
    --dark-3: #071120;
    --dark-4: #0A1628;
    --text: #E2EAF4;
    --text-dim: #7A90A8;
    --font-serif: 'Cormorant Garamond', Georgia, serif;
    --font-sans: 'Montserrat', sans-serif;
    --font-condensed: 'Oswald', sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: var(--font-sans);
    font-weight: 300;
    overflow-x: hidden;
    cursor: auto;
  }

  .cursor {
    width: 10px; height: 10px; background: var(--blue-bright); border-radius: 50%;
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%); transition: width .2s, height .2s;
  }
  .cursor-ring {
    width: 34px; height: 34px; border: 1px solid rgba(14,165,233,.5); border-radius: 50%;
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9998;
    transform: translate(-50%,-50%); transition: transform .14s ease-out, width .3s, height .3s;
  }

  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: .35;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 3.5rem;
    background: linear-gradient(135deg, rgba(4,12,24,.82) 0%, rgba(7,17,32,.78) 100%);
    backdrop-filter: blur(22px) saturate(1.4);
    -webkit-backdrop-filter: blur(22px) saturate(1.4);
    border-bottom: 1px solid rgba(201,168,76,.12);
    box-shadow: 0 1px 0 rgba(14,165,233,.06), 0 8px 32px rgba(0,0,0,.45);
  }
  .nav-logo { height: 52px; filter: drop-shadow(0 0 10px rgba(14,165,233,.4)); transition: filter .3s; }
  .nav-logo:hover { filter: drop-shadow(0 0 22px rgba(56,189,248,.75)); }

  .nav-links { display: flex; gap: .55rem; list-style: none; align-items: center; }

  .nav-links li { position: relative; }

  .nav-links a {
    font-family: var(--font-condensed); font-size: .72rem; font-weight: 500;
    letter-spacing: .2em; text-transform: uppercase; color: rgba(226,234,244,.7);
    text-decoration: none; position: relative;
    display: flex; align-items: center; gap: .45rem;
    padding: .52rem 1.25rem;
    /* Glass tile */
    background: linear-gradient(135deg,
      rgba(255,255,255,.065) 0%,
      rgba(255,255,255,.02) 50%,
      rgba(14,165,233,.04) 100%
    );
    border: 1px solid rgba(255,255,255,.09);
    border-top-color: rgba(255,255,255,.18);
    border-left-color: rgba(255,255,255,.14);
    border-bottom-color: rgba(0,0,0,.25);
    border-right-color: rgba(0,0,0,.15);
    border-radius: 6px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.12),
      inset 0 -1px 0 rgba(0,0,0,.2),
      0 2px 8px rgba(0,0,0,.28),
      0 0 0 0 rgba(14,165,233,0);
    transition: all .22s cubic-bezier(.4,0,.2,1);
    backdrop-filter: blur(4px);
  }

  /* Tiny icon dot per tile */
  .nav-links a::before {
    content: '';
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(201,168,76,.5);
    flex-shrink: 0;
    transition: background .22s, box-shadow .22s;
  }

  .nav-links a:hover {
    color: #fff;
    background: linear-gradient(135deg,
      rgba(14,165,233,.18) 0%,
      rgba(14,165,233,.06) 50%,
      rgba(201,168,76,.08) 100%
    );
    border-color: rgba(14,165,233,.35);
    border-top-color: rgba(14,165,233,.55);
    box-shadow:
      inset 0 1px 0 rgba(14,165,233,.25),
      inset 0 -1px 0 rgba(0,0,0,.2),
      0 4px 16px rgba(0,0,0,.35),
      0 0 20px rgba(14,165,233,.12);
    transform: translateY(-1px);
  }

  .nav-links a:hover::before {
    background: var(--blue);
    box-shadow: 0 0 6px rgba(14,165,233,.9);
  }

  .nav-links a:active {
    transform: translateY(0px);
    box-shadow:
      inset 0 2px 6px rgba(0,0,0,.3),
      inset 0 1px 0 rgba(14,165,233,.15),
      0 1px 4px rgba(0,0,0,.3);
  }

  /* Active/current page tile */
  .nav-links a.active {
    color: var(--gold-light);
    background: linear-gradient(135deg,
      rgba(201,168,76,.15) 0%,
      rgba(201,168,76,.05) 100%
    );
    border-color: rgba(201,168,76,.3);
    border-top-color: rgba(201,168,76,.5);
    box-shadow:
      inset 0 1px 0 rgba(201,168,76,.2),
      0 0 14px rgba(201,168,76,.1);
  }
  .nav-links a.active::before {
    background: var(--gold);
    box-shadow: 0 0 6px rgba(201,168,76,.9);
  }
